version: '3.8'

# Full-stack development environment
# Usage: docker compose up
# Frontend: http://localhost:5173
# Backend API: http://localhost:3000/api/v1
# Swagger docs: http://localhost:3000/api/docs
# PostgreSQL: localhost:5432
# Redis: localhost:6379

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: docker/Dockerfile.dev
    container_name: shopsmart-api
    ports:
      - '3000:3000'
      - '9229:9229'  # Debug port
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ecommerce
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SSL: 'false'
      DATABASE_LOGGING: 'false'
      DATABASE_POOL_SIZE: 5
      DATABASE_POOL_MIN: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-at-least-32-characters-long-change-in-prod
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      BCRYPT_ROUNDS: 10
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_MAX: 1000
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shopsmart-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/api/v1/health/liveness']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ─── Frontend Dev Server ─────────────────────────────────────────────────────
  client:
    image: node:20-alpine
    container_name: shopsmart-client
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host"
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ''  # Empty = use vite proxy (/api → http://api:3000)
      API_TARGET: http://api:3000  # Vite proxy target inside Docker
    depends_on:
      - api
    networks:
      - shopsmart-network
    restart: unless-stopped

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shopsmart-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopsmart-network
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shopsmart-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopsmart-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  shopsmart-network:
    driver: bridge
