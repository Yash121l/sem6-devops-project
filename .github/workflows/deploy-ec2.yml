name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Package release artifact
        run: |
          tar \
            --exclude=.git \
            --exclude=client/node_modules \
            --exclude=server/node_modules \
            -czf release.tar.gz .

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known_hosts
        run: ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy release artifact to EC2
        run: |
          scp release.tar.gz \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/sem6-devops-project-${{ github.sha }}.tar.gz"

      - name: Execute deployment script on EC2
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "APP_ARCHIVE=/tmp/sem6-devops-project-${{ github.sha }}.tar.gz \
            APP_DIR=${{ secrets.EC2_APP_DIR || '/opt/sem6-devops-project' }} \
            DEPLOY_SHA=${{ github.sha }} \
            SERVICE_NAME=${{ secrets.EC2_SERVICE_NAME || 'shopsmart-api' }} \
            bash -s" < scripts/deploy-ec2.sh
