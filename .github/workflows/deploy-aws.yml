name: Deploy to AWS

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

# Only one deploy can run at a time; new pushes cancel the previous run
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-progress deploy

# ──────────────────────────────────────────────────────────────────────────────
# Env defaults (can be overridden per-job)
# ──────────────────────────────────────────────────────────────────────────────
env:
  AWS_REGION:      ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME:    shopsmart
  TF_VERSION:      1.8.5
  NODE_VERSION:    "20"
  TF_STATE_BUCKET: shopsmart-tf-state          # created by bootstrap job
  TF_LOCK_TABLE:   shopsmart-tf-lock
  TF_WORKING_DIR:  infrastructure

# ──────────────────────────────────────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Bootstrap — create S3 state bucket + DynamoDB lock table if they don't
  #    exist. Safe to run on every deploy (idempotent).
  # ────────────────────────────────────────────────────────────────────────────
  bootstrap:
    name: Bootstrap Terraform Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Create Terraform state bucket (if not exists)
        run: |
          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "Creating state bucket $TF_STATE_BUCKET …"
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "$TF_STATE_BUCKET" \
                --region "$AWS_REGION"
            else
              aws s3api create-bucket \
                --bucket "$TF_STATE_BUCKET" \
                --region "$AWS_REGION" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$TF_STATE_BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          else
            echo "State bucket $TF_STATE_BUCKET already exists."
          fi

      - name: Create DynamoDB lock table (if not exists)
        run: |
          if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" 2>/dev/null; then
            echo "Creating DynamoDB lock table $TF_LOCK_TABLE …"
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name "$TF_LOCK_TABLE"
          else
            echo "Lock table $TF_LOCK_TABLE already exists."
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Infrastructure — run Terraform to provision / update AWS resources
  # ────────────────────────────────────────────────────────────────────────────
  infrastructure:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: bootstrap

    outputs:
      ecr_url:                  ${{ steps.tf_output.outputs.ecr_repository_url }}
      ecs_cluster:              ${{ steps.tf_output.outputs.ecs_cluster_name }}
      ecs_service:              ${{ steps.tf_output.outputs.ecs_service_name }}
      ecs_task_family:          ${{ steps.tf_output.outputs.ecs_task_definition_family }}
      cloudfront_id:            ${{ steps.tf_output.outputs.cloudfront_distribution_id }}
      frontend_bucket:          ${{ steps.tf_output.outputs.frontend_bucket_name }}
      api_url:                  ${{ steps.tf_output.outputs.api_url }}
      cloudfront_domain:        ${{ steps.tf_output.outputs.cloudfront_domain }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false   # needed to capture outputs

      - name: Terraform init (S3 backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="aws_region=$AWS_REGION" \
            -var="api_image_tag=sha-${{ github.sha }}" \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          ecr_url=$(terraform output -raw ecr_repository_url)
          ecs_cluster=$(terraform output -raw ecs_cluster_name)
          ecs_service=$(terraform output -raw ecs_service_name)
          ecs_task_family=$(terraform output -raw ecs_task_definition_family)
          cloudfront_id=$(terraform output -raw cloudfront_distribution_id)
          frontend_bucket=$(terraform output -raw frontend_bucket_name)
          api_url=$(terraform output -raw api_url)
          cloudfront_domain=$(terraform output -raw cloudfront_domain)

          echo "ecr_repository_url=$ecr_url"       >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$ecs_cluster"      >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$ecs_service"      >> "$GITHUB_OUTPUT"
          echo "ecs_task_definition_family=$ecs_task_family" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$cloudfront_id" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket_name=$frontend_bucket"      >> "$GITHUB_OUTPUT"
          echo "api_url=$api_url"                   >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain=$cloudfront_domain" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Build & push API Docker image to ECR
  # ────────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: infrastructure

    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: meta
        run: |
          ECR_URL="${{ needs.infrastructure.outputs.ecr_url }}"
          SHA_TAG="sha-${{ github.sha }}"
          IMAGE_URI="$ECR_URL:$SHA_TAG"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG"     >> "$GITHUB_OUTPUT"
          echo "ecr_url=$ECR_URL"     >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx (layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.ecr_url }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.ecr_url }}:latest
          cache-from: type=registry,ref=${{ steps.meta.outputs.ecr_url }}:cache
          cache-to:   type=registry,ref=${{ steps.meta.outputs.ecr_url }}:cache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Deploy API — update ECS task definition and force new deployment
  # ────────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: [infrastructure, build-api]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ needs.infrastructure.outputs.ecs_task_family }}" \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task_def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: api
          image: ${{ needs.build-api.outputs.image_uri }}

      - name: Deploy to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:        ${{ steps.task_def.outputs.task-definition }}
          service:                ${{ needs.infrastructure.outputs.ecs_service }}
          cluster:                ${{ needs.infrastructure.outputs.ecs_cluster }}
          wait-for-service-stability: true
          # Circuit breaker is enabled on the service — auto-rollback on failure

      - name: Verify API health
        run: |
          ALB_DNS=$(echo "${{ needs.infrastructure.outputs.api_url }}" | sed 's|/api/v1||' | sed 's|http://||')
          echo "Waiting for API health at http://$ALB_DNS/api/v1/health/liveness …"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/api/v1/health/liveness" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $STATUS, retrying in 10s …"
            sleep 10
          done
          echo "❌ API health check failed after 2 minutes"
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # 5. Build & deploy frontend to S3 + invalidate CloudFront
  # ────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: [infrastructure, deploy-api]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend (pointing at live API)
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ needs.infrastructure.outputs.api_url }}
          VITE_APP_ENV:      production
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync build to S3
        run: |
          # Upload hashed assets with long cache (1 year)
          aws s3 sync client/dist/assets \
            "s3://${{ needs.infrastructure.outputs.frontend_bucket }}/assets" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

          # Upload index.html and other root files with no-cache
          aws s3 sync client/dist \
            "s3://${{ needs.infrastructure.outputs.frontend_bucket }}" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "assets/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ needs.infrastructure.outputs.cloudfront_id }}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"
          # Wait for invalidation to complete (optional but gives clean signal)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ needs.infrastructure.outputs.cloudfront_id }}" \
            --id "$INVALIDATION_ID"

  # ────────────────────────────────────────────────────────────────────────────
  # 6. Summary — post deployment URL to the Actions summary
  # ────────────────────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [infrastructure, deploy-api, deploy-frontend]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-frontend.result }}" = "success" ] && \
             [ "${{ needs.deploy-api.result }}"      = "success" ]; then
            echo "### ✅ Deployment succeeded!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment encountered errors — check job logs above." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Website | ${{ needs.infrastructure.outputs.cloudfront_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔌 API     | ${{ needs.infrastructure.outputs.api_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
