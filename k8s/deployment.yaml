apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsmart-api
  namespace: shopsmart
  labels:
    app.kubernetes.io/name: shopsmart-api
spec:
  replicas: 2
  progressDeadlineSeconds: 900
  # Default 25% surge on 2 replicas can require a third pod briefly; that stays Pending on a
  # one-node cluster. Surge 0 + maxUnavailable 1 keeps at most 2 pods during rollouts.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shopsmart-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shopsmart-api
    spec:
      containers:
        - name: api
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: shopsmart-api-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
